<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1500">    
    <title>LTD Roxwood - Espace Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Roboto Slab', serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('ltd.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .container {
            position: relative;
            background-color: rgba(45, 45, 45, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            width: 98%; 
            max-width: 1500px; 
            text-align: center;
            border: 1px solid #555;
            backdrop-filter: blur(5px);
            margin: 20px auto;
        }

        .top-left-clock, .top-right-user {
            position: absolute;
            top: 25px;
            background-color: rgba(26, 26, 26, 0.9);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.95em;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            line-height: 1.5;
            color: #e0e0e0;
        }
        .top-left-clock { left: 30px; border: 1px solid #64b5f6; }
        .top-right-user { right: 30px; border: 1px solid #9c27b0; text-align: left; display: none; }
        
        h1 { color: #9c27b0; letter-spacing: 1px; margin-bottom: 15px; font-size: 2.5em; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5); }
        h3.entreprise-title { color: #9c27b0; border-bottom: 2px solid #9c27b0; padding-bottom: 10px; margin-top: 30px; font-size: 1.5em; text-align: left; }
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; margin-bottom: 20px; }
        .product-card.ent-card { background-color: rgba(30, 30, 30, 0.8); border: 1px solid #9c27b0; border-radius: 10px; padding: 15px; display: flex; flex-direction: column; align-items: center; transition: 0.2s; }
        .product-card.ent-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(156, 39, 176, 0.3); background-color: rgba(40, 40, 40, 0.9); }
        
        .prod-name { font-size: 0.9em; font-weight: bold; color: #ce93d8; margin-bottom: 5px; height: 50px; display: flex; align-items: center; text-align: center; }
        .prod-price { color: #ccc; font-size: 0.9em; margin-bottom: 10px; }
        .prod-subtotal { margin-top: 10px; font-weight: bold; color: #ab47bc; }
        
        .login-input, .info-input { width: 100%; padding: 12px; background-color: rgba(26, 26, 26, 0.8); border: 1px solid #9c27b0; color: white; border-radius: 8px; text-align: center; font-family: 'Roboto Slab', serif; font-size: 1em; }
        select.login-input option { background-color: #1a1a1a; }
        .qty-input { width: 80px; padding: 8px; background-color: rgba(255, 255, 255, 0.1); border: 1px solid #555; color: white; border-radius: 5px; text-align: center; font-weight: bold; font-family: 'Roboto Slab', serif; font-size: 1.2em; }
        
        .total-bar { background-color: rgba(51, 51, 51, 0.9); padding: 15px; border-radius: 8px; margin-top: 20px; border: 1px solid #9c27b0; display: flex; justify-content: space-between; align-items: center; }
        .total-label { font-size: 1.2em; font-weight: bold; color: white; }
        .total-amount { font-size: 1.8em; font-weight: bold; color: #ab47bc; }
        
        .btn { width: 100%; padding: 15px; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 1.1em; transition: 0.2s; }
        .btn:hover { filter: brightness(1.1); transform: scale(1.02); }
        .btn-purple { background: linear-gradient(45deg, #8e24aa, #6a1b9a); }
        .btn-red { background: linear-gradient(45deg, #d32f2f, #b71c1c); }
        
        .delivery-info-section { margin-top: 30px; text-align: left; background-color: rgba(34, 34, 34, 0.6); padding: 20px; border-radius: 10px; border: 1px solid #9c27b0; }
        .delivery-info-row { display: flex; gap: 10px; justify-content: space-between; margin-bottom: 15px; flex-wrap: wrap; }
        textarea.info-input { height: 80px; text-align: left; resize: vertical; }
        
        #entreprise-dashboard, #success-screen { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div id="top-left-clock" class="top-left-clock">
            📅 <span id="real-time-display"></span>
        </div>
        <div id="top-user-badge" class="top-right-user">
            <div style="color: #e0e0e0;">👤 Partenaire : <span id="top-user-name" style="color:#ce93d8; font-weight:bold;"></span></div>
        </div>

        <!-- Login Entreprise -->
        <div id="entreprise-login-screen">
            <h1>Espace Partenaire</h1>
            <p>Veuillez sélectionner votre entreprise et saisir votre mot de passe d'accès.</p>
            <div style="width: 50%; margin: 20px auto; display: flex; flex-direction: column; gap: 15px;">
                <select id="ent-login-name" class="login-input">
                    <option value="" disabled selected>🏢 Sélectionnez votre entreprise</option>
                    <option value="Flywheels">Flywheels</option>
                    <option value="Custom Motors">Custom Motors</option>
                    <option value="Auto Exotic">Auto Exotic</option>
                    <option value="Esthétique Vinewood">Esthétique Vinewood</option>
                    <option value="Esthétique Vespucci">Esthétique Vespucci</option>
                    <option value="Esthétique Paleto">Esthétique Paleto</option>
                    <option value="Esthétique Sandy">Esthétique Sandy</option>
                    <option value="Delight">Delight</option>
                    <option value="Yellow Jack">Yellow Jack</option>
                    <option value="Rex Dinners">Rex Dinners</option>
                </select>
                <input type="password" id="ent-password" class="login-input" placeholder="Mot de passe spécifique">
                <button class="btn btn-purple" onclick="checkEntrepriseLogin()">CONNEXION</button>
                <p id="error-ent" style="color:red; display:none; margin: 0; font-weight: bold;">Mot de passe ou entreprise incorrect.</p>
            </div>
        </div>

        <!-- Dashboard Commande Entreprise -->
        <div id="entreprise-dashboard">
            <h1>Commande Entreprise</h1>
            <h3 class="entreprise-title">VOTRE CATALOGUE PROFESSIONNEL</h3>
            
            <div id="ent-product-grid" class="product-grid"></div>
            
            <div class="total-bar">
                <span class="total-label">TOTAL À PAYER :</span>
                <span class="total-amount" id="ent-grand-total">0.00 $</span>
            </div>
            
            <div class="delivery-info-section">
                <h3 class="entreprise-title" style="border: none; margin-top: 0;">DÉTAILS DE L'ENTREPRISE</h3>
                <div class="delivery-info-row">
                    <input type="text" id="ent-company-name" class="info-input" readonly style="width: 100%; background-color: rgba(0,0,0,0.5); cursor: not-allowed; color: #ce93d8; font-weight: bold;">
                </div>
                <div class="delivery-info-row">
                    <input type="text" id="ent-client-contact" class="info-input" placeholder="👤 Nom du Contact" style="width: 48%;">
                    <input type="text" id="ent-client-phone" class="info-input" placeholder="📞 Tél. de contact" style="width: 48%;">
                </div>
                <div class="delivery-info-row">
                    <input type="date" id="ent-delivery-date" class="info-input" style="width: 48%;">
                    <input type="time" id="ent-delivery-time" class="info-input" style="width: 48%;">
                </div>
                <textarea id="ent-other-info" class="info-input" placeholder="📝 Notes complémentaires" style="margin-bottom: 0;"></textarea>
            </div>
            
            <div style="width: 100%; display: flex; gap: 15px; margin-top: 20px;">
                <button class="btn btn-purple" onclick="submitEntrepriseOrder()">TRANSMETTRE LA COMMANDE PRO</button>
                <button class="btn btn-red" onclick="location.reload()">DÉCONNEXION</button>
            </div>
        </div>

        <!-- Succès -->
        <div id="success-screen">
            <span style="font-size: 4em; color: #9c27b0; display:block; margin-bottom:20px;">✅</span>
            <h1 style="color: #ce93d8;">Commande Transmise !</h1>
            <button class="btn btn-purple" style="width:50%; margin-top:20px;" onclick="resetToDashboard()">NOUVELLE COMMANDE</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBxqUR8EtJw6gnUCUVQ5DTvbOnpvpPqZ3E",
            authDomain: "ltd-roxwood-afe8b.firebaseapp.com",
            databaseURL: "https://ltd-roxwood-afe8b-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "ltd-roxwood-afe8b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- MOTS DE PASSE PARTENAIRES ---
        const authorizedEntreprises = [
            { name: "Flywheels", pass: "fw!852369@FLY" },
            { name: "Custom Motors", pass: "cm?741258@CUS" },
            { name: "Auto Exotic", pass: "ae-963258@AUT" },
            { name: "Esthétique Vinewood", pass: "ev*159357@EST" },
            { name: "Esthétique Vespucci", pass: "ev+357159@EST" },
            { name: "Esthétique Paleto", pass: "ep=456789@EST" },
            { name: "Esthétique Sandy", pass: "es!987654@EST" },
            { name: "Delight", pass: "de?123987@DEL" },
            { name: "Yellow Jack", pass: "yj-654123@YEL" },
            { name: "Rex Dinners", pass: "rd*548947@REX" }
        ];

        // --- CATALOGUES PERSONNALISÉS PAR ENTREPRISE ---
        const catalogsByEnterprise = {
            "Flywheels": [
                { name: "Caoutchouc", price: 3.5 },
                { name: "Solvant", price: 20.0 },
                { name: "Eau purifiée", price: 2.0 },
                { name: "Eponge", price: 2.0 }
            ],
            "Custom Motors": [
                { name: "Caoutchouc", price: 3.5 },
                { name: "Solvant", price: 20.0 },
                { name: "Eau purifiée", price: 2.0 },
                { name: "Eponge", price: 2.0 }
            ],
            "Auto Exotic": [
                { name: "Caoutchouc", price: 3.5 },
                { name: "Solvant", price: 20.0 },
                { name: "Eau purifiée", price: 2.0 },
                { name: "Eponge", price: 2.0 }
            ],
            "Esthétique Vinewood": [ 
                { name: "Encre", price: 2.0 } 
            ],
            "Esthétique Vespucci": [ 
                { name: "Encre", price: 2.0 } 
            ],
            "Esthétique Paleto": [ 
                { name: "Encre", price: 2.0 } 
            ],
            "Esthétique Sandy": [ 
                { name: "Encre", price: 2.0 } 
            ],
            "Delight": [
                { name: "Pain burger", price: 2.0 },
                { name: "Bagel", price: 2.0 },
                { name: "Pain grillé", price: 2.0 },
                { name: "Pâtes", price: 2.0 },
                { name: "Nouille", price: 2.0 },
                { name: "Moutarde", price: 2.0 },
                { name: "Caramel", price: 2.0 },
                { name: "Crème fraîche", price: 2.0 },
                { name: "Barre de chocolat", price: 2.0 },
                { name: "Eau purifiée", price: 2.0 }
            ],
            "Rex Dinners": [
                { name: "Pain burger", price: 2.0 },
                { name: "Tortilla", price: 2.0 },
                { name: "Coquilles à Tacos", price: 2.0 },
                { name: "Moutarde", price: 2.0 },
                { name: "Crème fraîche", price: 2.0 },
                { name: "Barre de chocolat", price: 2.0 },
                { name: "Eau purifiée", price: 2.0 }
            ],
            "Yellow Jack": [
                { name: "Pain burger", price: 2.0 },
                { name: "Tortilla", price: 2.0 },
                { name: "Moutarde", price: 2.0 },
                { name: "Barre de chocolat", price: 2.0 },
                { name: "Eau purifiée", price: 2.0 },
                { name: "Papier a rouler", price: 2.0 }
            ]
        };

        let currentSessionName = "";
        let currentEnterpriseInventory = [];

        function checkEntrepriseLogin() {
            const nameSelect = document.getElementById("ent-login-name");
            const name = nameSelect.options[nameSelect.selectedIndex]?.value;
            const pwd = document.getElementById("ent-password").value;

            const found = authorizedEntreprises.find(e => e.name === name && e.pass === pwd);
            
            if(found) {
                document.getElementById("entreprise-login-screen").style.display = "none";
                document.getElementById("error-ent").style.display = "none";
                
                currentSessionName = found.name;
                currentEnterpriseInventory = catalogsByEnterprise[found.name] || [];
                
                document.getElementById("top-user-badge").style.display = "block";
                document.getElementById("top-user-name").innerText = found.name;
                document.getElementById("ent-company-name").value = found.name;
                
                document.getElementById("entreprise-dashboard").style.display = "block";
                initEntrepriseTable();
            } else { 
                document.getElementById("error-ent").style.display = "block"; 
            }
        }

        function initEntrepriseTable() {
            const grid = document.getElementById("ent-product-grid");
            grid.innerHTML = ""; 
            
            currentEnterpriseInventory.forEach((item, index) => {
                let card = `
                <div class="product-card ent-card">
                    <div class="prod-name">${item.name}</div>
                    <div class="prod-price">Prix pro : ${item.price.toFixed(2)} $</div>
                    <input type="number" min="0" class="qty-input" oninput="calculateEntrepriseTotal()" id="ent-qty-${index}" placeholder="0">
                    <div class="prod-subtotal" id="ent-sub-${index}">Total : 0.00 $</div>
                </div>`;
                grid.innerHTML += card;
            });
        }

        function calculateEntrepriseTotal() {
            let grandTotal = 0;
            currentEnterpriseInventory.forEach((item, index) => {
                let qty = parseInt(document.getElementById(`ent-qty-${index}`).value) || 0;
                let subtotal = item.price * qty;
                
                if(document.getElementById(`ent-sub-${index}`)) {
                    document.getElementById(`ent-sub-${index}`).innerText = "Total : " + subtotal.toFixed(2) + " $";
                }
                
                grandTotal += subtotal;
            });
            document.getElementById("ent-grand-total").innerText = grandTotal.toFixed(2) + " $";
            return grandTotal;
        }

        function submitEntrepriseOrder() {
            const total = calculateEntrepriseTotal();
            const contactName = document.getElementById("ent-client-contact").value.trim();
            const phone = document.getElementById("ent-client-phone").value.trim();

            if(total <= 0) { 
                alert("Erreur : La commande est vide !"); 
                return; 
            }
            if(!contactName || !phone) { 
                alert("Attention : Nom du contact et Téléphone obligatoires."); 
                return; 
            }

            let articlesList = [];
            currentEnterpriseInventory.forEach((item, index) => {
                let qty = parseInt(document.getElementById(`ent-qty-${index}`).value) || 0;
                if(qty > 0) {
                    articlesList.push(`<b>${qty}x</b> ${item.name}`);
                }
            });

            const newOrder = {
                type: "Entreprise", 
                dateCreation: new Date().toLocaleString('fr-FR'), 
                client: `${currentSessionName} (${contactName})`, 
                phone: phone,
                articles: articlesList.join(' | '), 
                zone: "Non applicable", 
                dateLivraison: document.getElementById("ent-delivery-date").value ? `${document.getElementById("ent-delivery-date").value.split('-').reverse().join('/')} à ${document.getElementById("ent-delivery-time").value}` : "Dès que possible",
                infos: document.getElementById("ent-other-info").value.trim() || "Aucune note",
                total: total.toFixed(2), 
                enCharge: "", 
                status: "En attente de préparation", 
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };

            db.ref('orders').push(newOrder)
                .then(() => {
                    document.getElementById("entreprise-dashboard").style.display = "none";
                    document.getElementById("success-screen").style.display = "block";
                })
                .catch((e) => alert("Erreur : " + e.message));
        }

        function resetToDashboard() {
            document.querySelectorAll(".qty-input").forEach(i => i.value = "");
            document.getElementById("ent-client-contact").value = "";
            document.getElementById("ent-client-phone").value = "";
            document.getElementById("ent-delivery-date").value = "";
            document.getElementById("ent-delivery-time").value = "";
            document.getElementById("ent-other-info").value = "";
            
            calculateEntrepriseTotal();
            
            document.getElementById("success-screen").style.display = "none";
            document.getElementById("entreprise-dashboard").style.display = "block";
        }

        function updateClock() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' });
            const timeStr = now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const clockEl = document.getElementById("real-time-display");
            if(clockEl) clockEl.innerText = dateStr + " - " + timeStr;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
